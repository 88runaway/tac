# Pi0.5 部署配置（由 eval_policy.py 加载）
#
# 评估的运行时参数（task、checkpoint、GPU、episode 数、seed 等）
# 统一在 config/eval.yaml 中配置，由 sh/eval.sh 读取并通过
# 环境变量 CKPT_ROOT / CKPT_CONFIG / CKPT_DIR 传递给 deploy_policy.py。
#
# 本文件只保存策略身份信息与静态默认值。

policy_name: Pi05

# ckpt_dir: 运行时由 deploy_policy.py 从 CKPT_ROOT/CKPT_CONFIG 或 CKPT_DIR 解析
ckpt_dir: null

# instruction_type 在 eval.yaml 中统一配置；此处仅作备份默认值
instruction_type: seen

# instuction_file: null 表示使用 instructions/<task_name>.json
instuction_file: null

# tokenizer_name: tokenizer 本地路径（避免联网下载）
# null = 使用 checkpoint 中保存的值（可能触发 HuggingFace 下载）
tokenizer_name: "/data1/zjb/ckpt/paligemma/paligemma-3b-pt-224"

# rename_map_override: 覆盖 preprocessor 中 rename_observations_processor 的 rename_map。
# 评估时，环境提供 observation.images.base_0_rgb，需映射回模型 config 期望的键名。
# null = 不覆盖，使用 checkpoint 保存的 rename_map。
rename_map_override:
  "observation.images.base_0_rgb": "observation.images.head"
