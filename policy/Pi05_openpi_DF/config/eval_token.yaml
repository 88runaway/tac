# ─── UniVTAC Pi0.5-DF Evaluation Configuration ───────────────────────────────
#
# 专用于 Pi0DF (Diffusion Forcing) checkpoint 的评估配置。
#
# Usage:
#   bash policy/Pi05_openpi_DF/sh/eval.sh --config eval_token.yaml
#   bash policy/Pi05_openpi_DF/sh/eval.sh                        # 使用全部默认值
#   bash policy/Pi05_openpi_DF/sh/eval.sh insert_HDMI            # 覆盖 task_name
#   bash policy/Pi05_openpi_DF/sh/eval.sh insert_HDMI 1          # 覆盖 task + GPU
#   CKPT_DIR=.../step_5000 bash policy/Pi05_openpi_DF/sh/eval.sh insert_HDMI 1

# ─── 任务 ─────────────────────────────────────────────────────────────────────
task_name: insert_HDMI          # 要评估的任务（task_settings.json 中的 key）
task_config: demo               # Isaac Lab 任务配置文件名（task_config/<name>.yml）

# ─── Checkpoint ───────────────────────────────────────────────────────────────
# JAX checkpoint 路径（orbax 格式），指向 train_df.py 输出的 step 目录
# 也可用 CKPT_DIR 环境变量在运行时覆盖，无需修改此文件
ckpt_dir: /data1/zjb/UniVTAC/outputs_openpi_df/checkpoints/pi05_univtac_df/pi05_df_insert_HDMI/12000
# ─── 硬件 ─────────────────────────────────────────────────────────────────────
gpu_id: "1"                     # CUDA_VISIBLE_DEVICES；多卡示例："1,2"（seed 自动拆分）

# ─── 评估规模 ─────────────────────────────────────────────────────────────────
total_num: 100                   # 评估总 episode 数
start_seed: -1                  # 起始 seed（-1 = 使用框架默认值 1000000）
max_seed: -1                    # 终止 seed（-1 = 不限）

# ─── 推理参数 ─────────────────────────────────────────────────────────────────
n_action_steps: 50              # 每次推理后连续执行的动作步数
num_inference_steps: 50         # 外层去噪总步数

# ─── Diffusion Forcing ────────────────────────────────────────────────────────
# infer_time_schedule: blockwise（金字塔调度）| const（标准去噪，消融用）
infer_time_schedule: blockwise
# block_size: null = 使用训练时的 num_blocks（推荐）
block_size: 5

# ─── 触觉模式 ─────────────────────────────────────────────────────────────────
# 必须与训练时使用的模式一致，服务器启动时会与 model_flags.json 做双重校验：
# 不一致时直接报错，避免用错模式的权重。
#
# Mode 1 — ResNet 编码触觉 token，注入 action suffix（原有方法）：
#   use_tactile: true
#   use_tactile_expert: false
#
# Mode 2 — ResNet + 独立 tactile expert（预测未来触觉）+ 双向 attend（新方法）：
#   use_tactile: true
#   use_tactile_expert: true
use_tactile: true           # true = 使用触觉闭环评估（_eval_tactile）
use_tactile_expert: false   # ← 与训练时 use_tactile_expert 保持一致！

# ─── 其他 ─────────────────────────────────────────────────────────────────────
# decimation: 训练数据以 save_frequency=2、decimation_train=1 采集
#   → 有效帧率 60 Hz（16.67 ms/帧）
#   → 评估时每 take_action() 需执行 2 个物理步 = 16.67 ms，与训练时序精确对齐
decimation: 2
instruction_type: seen
save_video: true
save_image: false
expert_check: false
