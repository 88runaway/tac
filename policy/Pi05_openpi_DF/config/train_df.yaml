# ─── UniVTAC Pi0.5-DF Training Configuration ────────────────────────────────
#
# 同时用于单任务和多任务训练，均通过 train_df.py 调用。
#
# 单任务:  python policy/Pi05_openpi_DF/train_df.py --task lift_bottle --gpu 0
# 多任务:  python policy/Pi05_openpi_DF/train_df.py --task all --gpu 0,1,2,3
#
# ─── Diffusion Forcing ────────────────────────────────────────────────────────
# block_size: 每个 block 包含的 action token 数
#   训练时 num_blocks = action_horizon // block_size（须整除）
#   推理时可通过 deploy_df.yml 中的 block_size 覆盖
#   ⚡ 性能提示: num_blocks 越大，每样本加载的触觉帧越多（左右各 num_blocks 帧）。
#   减小 block_size（增大 block_size 数值）可降低 num_blocks，从而减少 I/O 压力：
#     block_size=5  → num_blocks=10 → 每样本 20 帧触觉（较慢，时间分辨率高）
#     block_size=10 → num_blocks=5  → 每样本 10 帧触觉（较快，推荐初步实验）
block_size: 5  # ⚡ Sparsh encoder: 两帧时序步长 = block_size/fps = 5/60 ≈ 83ms，与 Sparsh 预训练步长 ~80ms 匹配

# mix_prob: 训练时以该概率使用逐 block 独立噪声（DF），
#   其余概率退化为全 chunk 共享噪声（标准 flow matching），用于稳定训练
#   1.0 = 完全 DF；0.0 = 完全标准 flow matching；推荐从 0.5 开始
mix_prob: 1.0

# block_time_sampling: DF 分支里每个 block 的噪声等级如何采样
#   independent : 每个 block 独立随机采样噪声等级（原始行为）
#   monotone    : 由单个全局进度标量映射出“固定单调递增”的逐 block 噪声等级
#                 （靠前 block 更早 clean），与推理 blockwise 金字塔调度完全同分布，
#                 可避免训练分布覆盖不到推理状态而导致的抖动，推荐使用
block_time_sampling: monotone

# reweight_gamma: monotone 调度下逆频率 loss 加权的指数参数
#   w_k = (num_blocks / (k+1)) ^ gamma，归一化后 mean(w_k) = 1
#
# 控制加权强度，平滑可调：
#   gamma = 0.0  →  无加权（所有 block 等权，回退旧行为）
#   gamma = 0.5  →  缓和加权（block 0/9 权重比 ≈ 3.2:1）
#   gamma = 1.0  →  完全逆频率（block 0/9 权重比 = 10:1，完全均衡期望梯度）
#   gamma > 1.0  →  激进加权（更大力度补偿早期 block）
#
# 仅在 block_time_sampling == monotone 时生效，independent 时自动忽略。
reweight_gamma: 0.5

# phase_alpha: monotone 调度中 phase 的 Beta(alpha, 1) 分布参数
#
# 原理: monotone 采样中 t_k = clip(1 - phase × nb/(k+1), 0, 1)
#   block 0 仅在 phase < 1/nb 时有梯度（10% 概率）。
#   phase ~ Uniform(0,1) 时，有梯度的 t 均匀分布在 (0,1)。
#   推理用 num_steps=50 时，block 0 实际需要 t ∈ [0.2, 1.0]（5步去噪）。
#
# Beta(alpha, 1) 将 phase 偏向 0（高噪声区），让更多训练样本落在
# 推理真正需要的状态（所有 block 同时高噪声），直接改善覆盖率：
#
#   alpha = 1.0  →  Uniform，无变化（默认，向后兼容）
#   alpha = 0.7  →  温和偏向：block 0 有梯度率 10% → 20%，推荐初次实验
#   alpha = 0.5  →  中等偏向：block 0 有梯度率 10% → 32%，推荐常规使用
#   alpha = 0.3  →  强偏向：block 0 有梯度率 10% → 50%，可能过于 aggressive
#
# 与 reweight_gamma 正交，两者可同时使用：
#   phase_alpha 修复"训练密度分布"问题
#   reweight_gamma 修复"总梯度量"问题
#
# 仅在 block_time_sampling == monotone 时生效，independent 时自动忽略。
phase_alpha: 0.7

# ─── Tactile injection (optional) ─────────────────────────────────────────────
# 启用后，触觉 rgb_marker 图像通过触觉编码器转为 16 token/指（共 32 token）
# 注入 action expert suffix，由 block 进度标量决定使用哪帧触觉。
# 需要用 convert_df_tactile.py 转出的带触觉的数据集。
use_tactile: false
tactile_tokens_per_finger: 16

# tactile_encoder_type: 选择触觉编码器后端
#   "resnet"  — ResNet-18，从零训练，单帧 3 通道输入（原始默认，无需额外权重）
#   "sparsh"  — Sparsh DINO ViT-Small，双帧 6 通道（当前帧‖上一 block 边界帧），
#               双线性空间池化 14×14→4×4=16 token，ViT backbone 从预训练权重初始化，
#               proj + spatial_emb(16×D) + finger_emb(2×D) 随机/零初始化需从头训练。
#               需要先运行:
#                 python policy/Pi05_openpi_DF/convert_sparsh_weights.py convert
tactile_encoder_type: "sparsh"

# sparsh_npz_path: Sparsh 预训练权重路径（仅 tactile_encoder_type=="sparsh" 时使用）
sparsh_npz_path: "/data/zjb/ckpts/sparsh/dino/sparsh_dino_small_jax.npz"

# sparsh_freeze_backbone: 是否冻结 Sparsh ViT backbone（pool+proj 始终可训）
#   true  — 第一阶段训练推荐：backbone 固定，只更新 pool、proj 和其余模型参数
#   false — 全量微调，训练数据足够时使用
sparsh_freeze_backbone: false

# 数据集根目录（含 head/wrist/tactile 全部模态的完整 lerobot 数据集）
# 无论是否启用触觉，均从此路径加载数据；任务子目录 = tactile_dataset_root / task_name
# use_tactile=false 时只不加载 tactile 图像列，不影响 head/wrist 的训练
tactile_dataset_root: "/data/zjb/data/UniVTAC/data_lerobot_openpi_df_tactile"

# --task all 时使用的多任务合并数据集路径（单一 lerobot 格式数据集目录）
# 为空时回落到 multitask_config.json 的 output_root/multitask
multitask_data_dir: "/data/zjb/data/UniVTAC/tac_all"

# ─── Tactile expert (future tactile prediction) ──────────────────────────────
# 启用后，新增一个 flow matching 流与 action 同步去噪，预测下一个 block 边界
# 的未来触觉 latent。两个 expert 互相 attend，action 从中获得前瞻触觉信息，
# 同时触觉预测提供 dense 辅助监督信号增强触觉/动作表征。
# 需要 use_tactile=true 作为前置条件。
use_tactile_expert: false
# Tactile expert 的 Transformer 架构（独立参数，与 action expert 同深度）
# gemma_300m: width=1024, depth=18, ~311M params（与 action expert 对称）
tactile_expert_variant: "gemma_300m"
# 预测 token 数（= num_tactile_tokens = tactile_tokens_per_finger * 2）
tactile_expert_num_tokens: 32
# 触觉预测 velocity loss 的权重（相对于 action loss）
tactile_expert_loss_weight: 1.0
# tactile expert 内部是否使用 local attention（节省显存，牺牲少量全局建模能力）
# 通常保持 false；显存极度紧张时才设 true
tac_expert_local_attn: false

# use_tactile_register_token: 是否将 Sparsh ViT 的 register token 作为额外触觉 token 加入 suffix
#   仅对 tactile_encoder_type=="sparsh" 有效；resnet 模式下忽略此项。
#   false (默认) — 丢弃 register token，每指 16 个空间 patch token，共 32 token
#   true          — 保留 register token（ViT 的全局 DINO 摘要），每指 17 token，共 34 token
#                   register token 获得独立可学习的 register_token_emb（零初始化）+ finger_emb，
#                   不分配 spatial_emb（它是全局摘要，无空间位置）。
#                   token 排布: [reg_L, patch_L×16, reg_R, patch_R×16]
use_tactile_register_token: false

# tactile_attend_prefix: 控制 suffix 中当前触觉 token 是否可以 attend prefix（图像/语言条件）
#   true  (默认) — 触觉 token 通过 make_attn_mask 的 causal cumsum 自然 attend 所有 prefix，
#                  与图像/语言特征充分交互，适合触觉与视觉/语义高度相关的任务。
#   false         — 触觉 token 被 mask 掉对 prefix 的 attention，只能 self-attend 及与
#                  action token 互相 attend，使触觉流与图像/语言条件完全解耦，
#                  适合消融实验或测试触觉信息单独的贡献。
tactile_attend_prefix: true

# ─── 模块冻结 (freeze) ────────────────────────────────────────────────────────
# true = 冻结该模块（不训练），false = 参与训练。默认全 false（全量微调）。
# 典型用法：warm start 已微调过的 ckpt 改造成 DF 时，只训 action_expert，
#   其余全部冻结 —— 即 img/paligemma/projections 设 true、action_expert 设 false。
freeze:
  img:                    true   # SigLIP 图像编码器
  paligemma:              true   # PaliGemma 主干 (gemma_2b, prefix LLM)
  action_expert:          false  # Action Expert (gemma_300m, 去噪/速度预测)
  projections:            false  # action_in_proj / action_out_proj / time_mlp_*
  tactile_expert_freeze:  false  # Tactile Expert 的 tac_expert_* 投影层
  sparsh_freeze_backbone: false  # Sparsh ViT backbone（pool+proj 始终可训）

# ─── 训练超参 ─────────────────────────────────────────────────────────────────
batch_size: 192      # 单任务默认；多任务建议改为 128（或通过 CLI 覆盖）
steps: 20000
lr: 8e-5
warmup_steps: 1000
save_freq: 2000    # 每隔多少步保存一次 checkpoint
log_freq: 50
# 每个 DataLoader worker 进程数。触觉数据集每样本包含 num_blocks 帧触觉图，
# 建议设为 8~12（取决于 CPU 核数），以保证 GPU 不等 CPU。
num_workers: 12
# 每个 worker 提前预取的 batch 数（None = PyTorch 默认 2）。
# 触觉数据批量大时推荐设为 4，可减少 worker 空档期。
prefetch_factor: 4
action_horizon: 50
ema: true
seed: 42

# ─── Checkpoint 保留策略 ──────────────────────────────────────────────────────
# orbax CheckpointManager 硬编码 max_to_keep=1，始终只保留最新 1 个 ckpt。
# keep_period: 额外永久保留满足 step % keep_period == 0 的里程碑 ckpt。
#   null  → 只保留最新 1 个（最省磁盘，推荐）
#   5000  → 额外保留 step 5000/10000/... 的 ckpt
keep_period: 5000

# ─── FSDP ─────────────────────────────────────────────────────────────────────
# 单 GPU 设为 1；多任务多 GPU 推荐设为 GPU 数量（须为 2 的幂次：1/2/4/8）
fsdp_devices: 1

# ─── 输出目录 ─────────────────────────────────────────────────────────────────
output_dir: "/data/zjb/ckpts/pi05_df_reweight_lift_can"

# ─── WandB ────────────────────────────────────────────────────────────────────
# 仅记录训练损失等标量，不上传模型参数或 artifact
wandb: true
wandb_project: "univtac-pi05-df-lift-can"

# ─── AdamW Optimizer ─────────────────────────────────────────────────────────
# optimizer:
#   b1: 0.9
#   b2: 0.95
#   eps: 1.0e-6
#   weight_decay: 1.0e-10
#   clip_gradient_norm: 1.0
